# Build-arg anchor for Solana toolchain consumers.
# Values come from versions.env — invoke compose with
# `--env-file versions.env --env-file .env` (later files win on conflict).
x-solana-build-args: &solana-build-args
  SOLANA_VERSION: ${SOLANA_VERSION}

x-validator-build-args: &validator-build-args
  SOLANA_VERSION: ${SOLANA_VERSION}
  YELLOWSTONE_TAG: ${YELLOWSTONE_TAG}

services:
  # PostgreSQL Primary (for write node)
  postgres-primary:
    image: postgres:16-alpine
    container_name: contra-postgres-primary
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_REPLICATION_MODE=master
      - POSTGRES_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRES_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      # Enable replication - allow connections from Docker network
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - postgres-primary-wal-archive:/wal_archive
      - ./init-primary.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./init-primary-hba.sh:/docker-entrypoint-initdb.d/02-hba.sh:ro
    command: |
      postgres
      -c wal_level=replica
      -c hot_standby=on
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby_feedback=on
      -c wal_log_hints=on
      -c archive_mode=on
      -c archive_command='cp %p /wal_archive/%f.tmp && mv /wal_archive/%f.tmp /wal_archive/%f'
      -c listen_addresses='*'
    networks:
      - contra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Write Node (formerly sequencer)
  write-node:
    build:
      context: .
      dockerfile: Dockerfile
      args: *solana-build-args
    container_name: contra-write-node
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      - postgres-primary
    environment:
      - RUST_LOG=info
      - CONTRA_PORT=${CONTRA_WRITE_PORT}
      - CONTRA_ACCOUNTSDB_CONNECTION_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB}
      - CONTRA_ENABLE_READ=false
      - CONTRA_SIGVERIFY_QUEUE_SIZE=${CONTRA_SIGVERIFY_QUEUE_SIZE}
      - CONTRA_SIGVERIFY_WORKERS=${CONTRA_SIGVERIFY_WORKERS}
      - CONTRA_MAX_CONNECTIONS=${CONTRA_WRITE_MAX_CONNECTIONS}
      - CONTRA_PG_MAX_CONNECTIONS=${CONTRA_PG_MAX_CONNECTIONS:-32}
      - CONTRA_MAX_TX_PER_BATCH=${CONTRA_MAX_TX_PER_BATCH}
      - CONTRA_BATCH_DEADLINE_MS=${CONTRA_BATCH_DEADLINE_MS:-10}
      - CONTRA_BATCH_CHANNEL_CAPACITY=${CONTRA_BATCH_CHANNEL_CAPACITY:-16}
      - CONTRA_MAX_SVM_WORKERS=${CONTRA_MAX_SVM_WORKERS:-8}
      - CONTRA_LOG_LEVEL=info
      - CONTRA_JSON_LOGS=false
      - CONTRA_MODE=write
      - CONTRA_ADMIN_KEYS=${CONTRA_ADMIN_KEYS}
      - CONTRA_METRICS=${CONTRA_METRICS:-false}
      - CONTRA_METRICS_PORT=${CONTRA_METRICS_PORT:-9090}
    ports:
      - "${CONTRA_WRITE_PORT}:${CONTRA_WRITE_PORT}"
    command: ["/usr/local/bin/contra-node"]
    networks:
      - contra-network

  # PostgreSQL Replica (for read node)
  postgres-replica:
    image: postgres:16-alpine
    container_name: contra-postgres-replica
    restart: unless-stopped
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_REPLICATION_MODE=slave
      - POSTGRES_MASTER_HOST=postgres-primary
      - POSTGRES_MASTER_PORT=5432
      - POSTGRES_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRES_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      - PGUSER=${POSTGRES_USER}
    ports:
      - "5433:5432"
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    user: postgres
    command: |
      bash -c "
        until PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres-primary -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' > /dev/null 2>&1; do
          echo 'Waiting for primary to be ready...'
          sleep 2
        done

        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          echo 'Setting up replica...'
          rm -rf /var/lib/postgresql/data/*
          PGPASSWORD=${POSTGRES_REPLICATION_PASSWORD} pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U ${POSTGRES_REPLICATION_USER} -v -P -R -S replica_slot

          chmod 700 /var/lib/postgresql/data
          touch /var/lib/postgresql/data/standby.signal
        fi

        postgres
      "
    networks:
      - contra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Read Node
  read-node:
    build:
      context: .
      dockerfile: Dockerfile
      args: *solana-build-args
    container_name: contra-read-node
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      - postgres-replica
      - write-node
    environment:
      - RUST_LOG=info
      - CONTRA_PORT=${CONTRA_READ_PORT}
      - CONTRA_ACCOUNTSDB_CONNECTION_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB}
      - CONTRA_MAX_CONNECTIONS=${CONTRA_READ_MAX_CONNECTIONS}
      - CONTRA_PG_MAX_CONNECTIONS=${CONTRA_PG_MAX_CONNECTIONS:-32}
      - CONTRA_ENABLE_WRITE=false
      - CONTRA_ENABLE_READ=true
      - CONTRA_LOG_LEVEL=info
      - CONTRA_JSON_LOGS=false
      - CONTRA_MODE=read
    ports:
      - "${CONTRA_READ_PORT}:${CONTRA_READ_PORT}"
    command: ["/usr/local/bin/contra-node"]
    networks:
      - contra-network

  # Gateway (Routes requests between write and read nodes)
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args: *solana-build-args
    container_name: contra-gateway
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      - write-node
      - read-node
    environment:
      - RUST_LOG=info
      - GATEWAY_PORT=${GATEWAY_PORT}
      - GATEWAY_WRITE_URL=${GATEWAY_WRITE_URL}
      - GATEWAY_READ_URL=${GATEWAY_READ_URL}
      - METRICS_PORT=9101
      # Optional — omit or leave blank to disable RBAC enforcement.
      - JWT_SECRET=${JWT_SECRET:-}
      - AUTH_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB}
      - AUTH_DATABASE_MAX_CONNECTIONS=${AUTH_DATABASE_MAX_CONNECTIONS:-10}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    command: ["/usr/local/bin/gateway"]
    networks:
      - contra-network

  # Auth Service (optional — run with: docker compose --profile auth up)
  auth:
    profiles: [auth]
    build:
      context: .
      dockerfile: Dockerfile
      args: *solana-build-args
    container_name: contra-auth
    restart: unless-stopped
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      - RUST_LOG=info
      - AUTH_PORT=${AUTH_PORT}
      - AUTH_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGIN=${CORS_ALLOWED_ORIGIN:-*}
      - AUTH_DATABASE_MAX_CONNECTIONS=${AUTH_DATABASE_MAX_CONNECTIONS:-10}
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    command: ["/usr/local/bin/auth"]
    networks:
      - contra-network

  # WebSocket Transaction Streamer
  streamer:
    build:
      context: .
      dockerfile: Dockerfile
      args: *solana-build-args
    container_name: contra-streamer
    restart: unless-stopped
    depends_on:
      - postgres-replica
      - write-node
      - postgres-indexer
    environment:
      - RUST_LOG=info
      - STREAMER_PORT=${STREAMER_PORT:-8902}
      - STREAMER_ACCOUNTSDB_CONNECTION_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB}
      - STREAMER_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-indexer:5432/${POSTGRES_INDEXER_DB}
      - STREAMER_POLL_INTERVAL_MS=200
      - STREAMER_LOG_LEVEL=info
    ports:
      - "${STREAMER_PORT:-8902}:${STREAMER_PORT:-8902}"
    command: ["/usr/local/bin/streamer"]
    networks:
      - contra-network

  # Activity Generator
  activity:
    build:
      context: .
      dockerfile: Dockerfile
      args: *solana-build-args
    container_name: contra-activity
    restart: unless-stopped
    depends_on:
      - write-node
      - read-node
    environment:
      - RUST_LOG=info
    volumes:
      - ./keypairs:/keypairs:ro
    command:
      [
        "/usr/local/bin/activity",
        "--rpc-url",
        "${GATEWAY_URL}",
        "--admin-keypair",
        "/keypairs/admin.json",
        "--users",
        "1000",
        "--initial-balance",
        "10000",
        "--user-delay-ms",
        "1000",
        "--admin-delay-ms",
        "10000",
        "-v",
      ]
    networks:
      - contra-network

  # Solana Validator with Yellowstone gRPC Plugin
  validator:
    build:
      context: .
      dockerfile: validator.Dockerfile
      args: *validator-build-args
    container_name: contra-validator
    restart: unless-stopped
    deploy:
      replicas: 1
    # Agave 3.1 asserts io_uring_supported(); Docker's default seccomp profile
    # blocks io_uring_setup, so the validator panics at startup without this.
    security_opt:
      - seccomp=unconfined
    ports:
      - "18899:8899"
      - "18900:8900"
      - "10000:10000"
      - "18999:8999"
    volumes:
      - validator-data:/validator-data
      - ./yellowstone-config.json:/config/yellowstone-config.json:ro
      - ./target/deploy:/programs:ro
    environment:
      - RUST_LOG=info
      - ESCROW_PROGRAM_ID=${ESCROW_PROGRAM_ID}
      - WITHDRAW_PROGRAM_ID=${WITHDRAW_PROGRAM_ID}
    command: >
      solana-test-validator
      --reset
      --bpf-program ${ESCROW_PROGRAM_ID} /programs/contra_escrow_program.so
      --bpf-program ${WITHDRAW_PROGRAM_ID} /programs/contra_withdraw_program.so
      --clone TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA
      --clone TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb
      --clone ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL
      --url https://api.mainnet-beta.solana.com
      --geyser-plugin-config /config/yellowstone-config.json
    networks:
      - contra-network
    healthcheck:
      test: ["CMD-SHELL", "solana cluster-version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Indexer
  postgres-indexer:
    image: postgres:16-alpine
    container_name: contra-postgres-indexer
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_INDEXER_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres-indexer-data:/var/lib/postgresql/data
      - postgres-indexer-wal-archive:/wal_archive
    command: |
      postgres
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='cp %p /wal_archive/%f.tmp && mv /wal_archive/%f.tmp /wal_archive/%f'
      -c listen_addresses='*'
    networks:
      - contra-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_INDEXER_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Indexer Service - Solana (Yellowstone)
  indexer-solana:
    build:
      context: .
      dockerfile: Dockerfile
      args: *solana-build-args
    container_name: contra-indexer-solana
    restart: unless-stopped
    deploy:
      replicas: 1
    depends_on:
      postgres-indexer:
        condition: service_healthy
      validator:
        condition: service_healthy
    environment:
      - RUST_LOG=info,contra_indexer=debug
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-indexer:5432/${POSTGRES_INDEXER_DB}
      - COMMON_RPC_URL=${LOCAL_VALIDATOR_RPC_URL}
      - INDEXER_YELLOWSTONE_ENDPOINT=http://validator:10000
      - METRICS_PORT=9100
      # Injected by bench-tps/scripts/run.sh, the full-stack orchestration script that
      # derives the escrow instance PDA and writes it to .env before starting services.
      # When absent (e.g. manual `docker compose up`), the TOML config's
      # escrow_instance_id is used — update that value to match your deployment.
      - COMMON_ESCROW_INSTANCE_ID
    volumes:
      - ./indexer/config:/config:ro
    command:
      - /bin/sh
      - -c
      - |
        /usr/local/bin/indexer \
          --config /config/local/indexer-solana.toml \
          -v \
          indexer
    networks:
      - contra-network

  # Indexer Service - Contra (RPC Polling)
  indexer-contra:
    build:
      context: .
      dockerfile: Dockerfile
      args: *solana-build-args
    container_name: contra-indexer-contra
    restart: unless-stopped
    deploy:
      replicas: 1
    depends_on:
      postgres-indexer:
        condition: service_healthy
      # Watches Contra write-node for WithdrawFunds instructions
      gateway:
        condition: service_started
    environment:
      - RUST_LOG=info,contra_indexer=debug
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-indexer:5432/${POSTGRES_INDEXER_DB}
      # rpc_url = Contra gateway — polls for WithdrawFunds (burn) instructions on Contra.
      - COMMON_RPC_URL=http://gateway:${GATEWAY_PORT}
      - METRICS_PORT=9100
    volumes:
      - ./indexer/config:/config:ro
    command:
      - /bin/sh
      - -c
      - |
        /usr/local/bin/indexer \
          --config /config/local/indexer-contra.toml \
          -v \
          indexer
    networks:
      - contra-network

  # Operator Service - Solana
  operator-solana:
    build:
      context: .
      dockerfile: Dockerfile
      args: *solana-build-args
    container_name: contra-operator-solana
    restart: unless-stopped
    depends_on:
      postgres-indexer:
        condition: service_healthy
      write-node:
        condition: service_started
    environment:
      - RUST_LOG=info,contra_indexer=debug
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-indexer:5432/${POSTGRES_INDEXER_DB}
      # rpc_url = Contra gateway (routes reads→read-node, writes→write-node)
      - COMMON_RPC_URL=http://gateway:${GATEWAY_PORT}
      # source_rpc_url = Solana Solana validator 
      - COMMON_SOURCE_RPC_URL=${LOCAL_VALIDATOR_RPC_URL}
      # Injected by bench-tps/scripts/run.sh, the full-stack orchestration script that
      # derives the escrow instance PDA and writes it to .env before starting services.
      # When absent (e.g. manual `docker compose up`), the TOML config's
      # escrow_instance_id is used — update that value to match your deployment.
      - COMMON_ESCROW_INSTANCE_ID
      - ADMIN_SIGNER=memory
      - ADMIN_PRIVATE_KEY=${ADMIN_PRIVATE_KEY}
      - OPERATOR_SIGNER=memory
      - OPERATOR_PRIVATE_KEY=${ADMIN_PRIVATE_KEY}
      - METRICS_PORT=9102
    ports:
      # Exposed to host so bench-tps can scrape contra_operator_mints_sent_total
      # from outside Docker for e2e deposit measurement (BENCH_INDEXER_METRICS_URL).
      - "9102:9102"
    volumes:
      - ./indexer/config:/config:ro
    command:
      - /bin/sh
      - -c
      - |
        /usr/local/bin/indexer \
          --config /config/local/operator-solana.toml \
          -v \
          operator
    networks:
      - contra-network

  # Operator Service - Contra
  operator-contra:
    build:
      context: .
      dockerfile: Dockerfile
      args: *solana-build-args
    container_name: contra-operator-contra
    restart: unless-stopped
    depends_on:
      postgres-indexer:
        condition: service_healthy
    environment:
      - RUST_LOG=info,contra_indexer=debug
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-indexer:5432/${POSTGRES_INDEXER_DB}
      # rpc_url = Solana Solana validator (where ReleaseFunds transactions are sent)
      - COMMON_RPC_URL=${LOCAL_VALIDATOR_RPC_URL}
      # source_rpc_url = Contra gateway (source of withdrawal/burn state)
      - COMMON_SOURCE_RPC_URL=http://gateway:${GATEWAY_PORT}
      - ADMIN_SIGNER=memory
      - ADMIN_PRIVATE_KEY=${ADMIN_PRIVATE_KEY}
      - OPERATOR_SIGNER=memory
      - OPERATOR_PRIVATE_KEY=${ADMIN_PRIVATE_KEY}
      # Patched into .env by run.sh before `docker compose up` runs.
      # Passed through from the host shell — run.sh exports it via
      # `set -a; source .env; set +a` so this picks it up automatically.
      - COMMON_ESCROW_INSTANCE_ID
      - METRICS_PORT=9103
    ports:
      # Exposed to host so bench-tps can scrape contra_operator_mints_sent_total
      # from outside Docker for e2e withdraw measurement (BENCH_WITHDRAW_OPERATOR_METRICS_URL).
      - "9103:9103"
    volumes:
      - ./indexer/config:/config:ro
    command:
      - /bin/sh
      - -c
      - |
        /usr/local/bin/indexer \
          --config /config/local/operator-contra.toml \
          -v \
          operator
    networks:
      - contra-network

  # Base backup sidecar for postgres-primary
  pg-backup-primary:
    image: postgres:16-alpine
    container_name: contra-pg-backup-primary
    restart: unless-stopped
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      - PGHOST=postgres-primary
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - PG_BACKUP_INTERVAL_HOURS=${PG_BACKUP_INTERVAL_HOURS:-6}
      - PG_BACKUP_RETENTION_COUNT=${PG_BACKUP_RETENTION_COUNT:-3}
    volumes:
      - postgres-primary-basebackups:/backups
      - postgres-primary-wal-archive:/wal_archive
      - ./scripts/pg-backup.sh:/usr/local/bin/pg-backup.sh:ro
    command: ["/usr/local/bin/pg-backup.sh"]
    networks:
      - contra-network

  # Base backup sidecar for postgres-indexer
  pg-backup-indexer:
    image: postgres:16-alpine
    container_name: contra-pg-backup-indexer
    restart: unless-stopped
    depends_on:
      postgres-indexer:
        condition: service_healthy
    environment:
      - PGHOST=postgres-indexer
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - PG_BACKUP_INTERVAL_HOURS=${PG_BACKUP_INTERVAL_HOURS:-6}
      - PG_BACKUP_RETENTION_COUNT=${PG_BACKUP_RETENTION_COUNT:-3}
    volumes:
      - postgres-indexer-basebackups:/backups
      - postgres-indexer-wal-archive:/wal_archive
      - ./scripts/pg-backup.sh:/usr/local/bin/pg-backup.sh:ro
    command: ["/usr/local/bin/pg-backup.sh"]
    networks:
      - contra-network

  # Blackbox Exporter for HTTP health probing
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: contra-blackbox-exporter
    restart: unless-stopped
    networks:
      - contra-network

  # cAdvisor for container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: contra-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    networks:
      - contra-network

  # Prometheus for metrics collection
  prometheus:
    build:
      context: .
      dockerfile: Dockerfile.prometheus
    container_name: contra-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    environment:
      - HOST_SUFFIX=
      - BENCH_METRICS_TARGET=${BENCH_METRICS_TARGET:-host.docker.internal:9101}
      - CONTRA_METRICS_PORT=${CONTRA_METRICS_PORT:-9090}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - contra-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: contra-grafana
    restart: unless-stopped
    ports:
      - "37429:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - POSTGRES_INDEXER_DB=${POSTGRES_INDEXER_DB}
      - POSTGRES_INDEXER_HOST=${POSTGRES_INDEXER_HOST:-postgres-indexer}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-http://localhost:9/no-op}
    networks:
      - contra-network

volumes:
  postgres-primary-data:
  postgres-replica-data:
  postgres-indexer-data:
  postgres-primary-wal-archive:
  postgres-indexer-wal-archive:
  postgres-primary-basebackups:
  postgres-indexer-basebackups:
  validator-data:
  prometheus-data:
  grafana-data:

networks:
  contra-network:
    driver: bridge
