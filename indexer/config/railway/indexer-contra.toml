# Railway configuration for Contra indexer (RPC Polling)
#
# Required environment variables:
#   DATABASE_URL   - PostgreSQL connection string
#   COMMON_RPC_URL - Contra gateway URL (overrides rpc_url below)

[common]
program_type = "withdraw"
rpc_url = "http://placeholder-set-via-env"

[storage]
type = "postgres"
max_connections = 10

[indexer]
datasource_type = "rpc_polling"

[indexer.rpc_polling]
poll_interval_ms = 1000
error_retry_interval_ms = 5000
batch_size = 50

[indexer.backfill]
enabled = true
backfill_only = false
batch_size = 100
max_gap_slots = 10000000
