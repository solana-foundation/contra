# blackbox_exporter config — single module that does an HTTP GET and asserts
# 2xx. The Prometheus scrape job passes `module=http_2xx` and `target=<url>`.
modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      preferred_ip_protocol: ip4
      valid_http_versions: [HTTP/1.1, HTTP/2.0]
      valid_status_codes: [200]
      method: GET
      fail_if_ssl: false
      fail_if_not_ssl: false
