# Railway configuration for Solana Private Channels Operator (withdraw program)
#
# Required environment variables:
#   DATABASE_URL     - PostgreSQL connection string
#   COMMON_RPC_URL   - Solana Private Channels gateway URL (overrides rpc_url below)
#   ADMIN_SIGNER     - Signer type (memory/vault/turnkey/privy)
#   ADMIN_PRIVATE_KEY - Admin private key
# Optional:
#   OPERATOR_SIGNER      - Operator signer type (falls back to admin)
#   OPERATOR_PRIVATE_KEY - Operator private key

[common]
program_type = "withdraw"
rpc_url = "http://placeholder-set-via-env"

[storage]
type = "postgres"
max_connections = 10

[operator]
poll_interval_secs = 1
batch_size = 10
retry_max_attempts = 3
retry_base_delay_secs = 1
channel_buffer_size = 100
# Solana mainnet block time is ~400 ms
confirmation_poll_interval_ms = 400
