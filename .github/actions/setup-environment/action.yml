name: "Setup Environment"
description: "Common setup steps for Contra CI/CD workflows"

inputs:
  rust-components:
    description: "Rust components to install (comma-separated)"
    required: false
    default: ""
  install-cargo-tools:
    description: "Additional cargo tools to install (comma-separated)"
    required: false
    default: ""
  install-base-cargo-tools:
    description: "Install base cargo tools (cargo-llvm-cov)"
    required: false
    default: "true"
  install-system-dependencies:
    description: "Install apt system dependencies"
    required: false
    default: "true"
  setup-node:
    description: "Setup Node.js runtime"
    required: false
    default: "true"
  setup-pnpm:
    description: "Setup pnpm and pnpm cache"
    required: false
    default: "true"
  setup-solana:
    description: "Setup Solana CLI"
    required: false
    default: "true"
  install-dependencies:
    description: "Run project dependency installation (make install)"
    required: false
    default: "true"
  build-programs:
    description: "Build programs and generate clients (make build)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set tool versions
      shell: bash
      run: |
        echo "RUST_VERSION=1.91.0" >> $GITHUB_ENV
        echo "LLVM_COV_VERSION=0.8.4" >> $GITHUB_ENV

    - name: Install system dependencies
      if: inputs.install-system-dependencies == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libudev-dev \
          pkg-config \
          libssl-dev \
          protobuf-compiler \
          librocksdb-dev \
          clang \
          libclang-dev

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        components: ${{ inputs.rust-components }}
        toolchain: ${{ env.RUST_VERSION }}

    - name: Cache cargo binaries
      if: inputs.install-base-cargo-tools == 'true'
      uses: actions/cache@v4
      id: cargo-bin-cache
      with:
        path: |
          ~/.cargo/bin/cargo-llvm-cov
        key: cargo-bins-v8-${{ runner.os }}-rust-${{ env.RUST_VERSION }}-llvm-cov-${{ env.LLVM_COV_VERSION }}

    - name: Add cargo bin to PATH
      if: inputs.install-base-cargo-tools == 'true' || inputs.install-cargo-tools != ''
      shell: bash
      run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install base cargo tools
      if: inputs.install-base-cargo-tools == 'true' && steps.cargo-bin-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "Installing cargo-llvm-cov@${LLVM_COV_VERSION}..."
        cargo install cargo-llvm-cov@${LLVM_COV_VERSION}

    - name: Install additional cargo tools
      if: inputs.install-cargo-tools != ''
      shell: bash
      run: |
        IFS=',' read -ra TOOLS <<< "${{ inputs.install-cargo-tools }}"
        for tool in "${TOOLS[@]}"; do
          tool=$(echo "$tool" | xargs)  # Trim whitespace
          echo "Installing $tool..."
          cargo install "$tool"
        done

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        cache-bin: false

    # install-dependencies implies Node.js + pnpm prerequisites.
    - name: Setup Node.js
      if: inputs.setup-node == 'true' || inputs.install-dependencies == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        registry-url: "https://registry.npmjs.org"

    - name: Setup pnpm
      if: inputs.setup-pnpm == 'true' || inputs.install-dependencies == 'true'
      uses: pnpm/action-setup@v2
      with:
        version: 10.15.1

    - name: Get pnpm store directory
      if: inputs.setup-pnpm == 'true' || inputs.install-dependencies == 'true'
      id: pnpm-store
      shell: bash
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      if: inputs.setup-pnpm == 'true' || inputs.install-dependencies == 'true'
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Setup Solana CLI
      if: inputs.setup-solana == 'true'
      uses: ./.github/actions/setup-solana

    - name: Add Solana to PATH
      if: inputs.setup-solana == 'true'
      shell: bash
      run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: make install

    - name: Build program and generate clients
      if: inputs.build-programs == 'true'
      shell: bash
      run: |
        echo "🔨 Building programs and generating clients..."
        make build
