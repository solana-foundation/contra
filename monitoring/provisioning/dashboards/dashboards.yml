apiVersion: 1

# Single dashboard provider, used by both the Dockerfile.grafana build
# (`make docker-up`) and the Ansible-deployed Grafana (private-channel-deploy/).
# allowUiUpdates lets users tweak in the UI; changes revert on the next
# provisioning sync (interval: 30s), so the JSON files in monitoring/
# dashboards/ remain the source of truth.

providers:
  - name: private-channel
    orgId: 1
    folder: Solana Private Channels
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
