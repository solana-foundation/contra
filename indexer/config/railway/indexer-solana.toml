# Railway configuration for Solana indexer (Yellowstone)
#
# Required environment variables:
#   DATABASE_URL              - PostgreSQL connection string
#   COMMON_RPC_URL            - Solana RPC endpoint (overrides rpc_url below)
#   COMMON_ESCROW_INSTANCE_ID - Escrow instance pubkey
#   INDEXER_YELLOWSTONE_ENDPOINT - Yellowstone gRPC endpoint (overrides endpoint below)
#   INDEXER_YELLOWSTONE_TOKEN    - Yellowstone auth token

[common]
program_type = "escrow"
rpc_url = "https://api.mainnet-beta.solana.com"

[storage]
type = "postgres"
max_connections = 10

[indexer]
datasource_type = "yellowstone"

[indexer.yellowstone]
endpoint = "http://placeholder-set-via-env"
commitment = "confirmed"

[indexer.rpc_polling]
poll_interval_ms = 1000
error_retry_interval_ms = 5000
batch_size = 50

[indexer.backfill]
enabled = true
backfill_only = false
batch_size = 100
max_gap_slots = 10000000
