---
# Stop the Contra + monitoring stacks, preserving volumes (DB state survives).
# The next `ansible-playbook deploy.yml` re-uses the same volumes and DB, so
# this is the right verb for "pause the stack overnight" or "free CPU now,
# resume tomorrow." For a clean wipe use `teardown.yml` instead.
#
# Usage: ansible-playbook down.yml -l dev
- name: Stop Contra (preserve volumes)
  hosts: all
  gather_facts: false
  vars_files:
  - vars/common.yml
  # Selects vars/<env>.yml from the host's inventory group (e.g. dev → vars/dev.yml). Override via -e env=<name>.
  - "vars/{{ env | default(group_names | difference(['all']) | first | default('dev')) }}.yml"

  tasks:
  - name: "==== STOP: preserve volumes ===="
    ansible.builtin.debug:
      msg: "Stopping monitoring + contra stacks. Volumes and host_data_dir untouched."

  # Monitoring first so blackbox probes drop before the contra network goes
  # idle. Both `stop` calls are no-ops if the stack was never deployed.
  - name: Stop monitoring stack
    ansible.builtin.shell: |
      if [ -f "{{ monitoring_dir }}/monitoring.compose.yml" ]; then
        docker compose \
          --env-file {{ host_data_dir }}/config/.env \
          -f {{ monitoring_dir }}/monitoring.compose.yml \
          stop || true
      fi
    changed_when: true

  - name: Stop contra stack
    ansible.builtin.shell: |
      if [ -f "{{ target_override_file }}" ]; then
        docker compose -p contra \
          --env-file {{ target_versions_env_file }} \
          --env-file {{ target_config_dir }}/.env \
          -f {{ target_compose_file }} \
          -f {{ target_override_file }} \
          stop || true
      fi
    changed_when: true

  - name: Report
    ansible.builtin.debug:
      msg: |
        Stopped. Containers exist as Exited; volumes preserved.
        Resume with: ansible-playbook deploy.yml -l {{ group_names | difference(['all']) | first | default('dev') }}
        Wipe with:   ansible-playbook teardown.yml -l {{ group_names | difference(['all']) | first | default('dev') }}
