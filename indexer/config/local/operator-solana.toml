# Local docker-compose configuration for Solana Operator (escrow program)

[common]
program_type = "escrow"
# Solana Private Channels write node (gateway) — where mint transactions are sent
rpc_url = "http://localhost:8898"

# Solana Solana validator — source of escrow deposit metadata and mint account state
source_rpc_url = "http://localhost:18899"

# Placeholder — overridden at runtime by COMMON_ESCROW_INSTANCE_ID, which
# bench-tps/scripts/run.sh derives from the persistent deposit-instance-seed.json
# keypair and injects via .env before starting Docker services.
# Only used as a fallback for manual `docker compose up` without run.sh;
# update this value to match your actual escrow instance PDA in that case.
escrow_instance_id = "7HgtQ4VcSZJDtzUBQbjqMWcSr5dauigbqRFqpQMK8pwz"

[storage]
type = "postgres"
max_connections = 10

[operator]
# Faster poll/batch settings suited to higher-throughput
poll_interval_secs = 1
batch_size = 1000
retry_max_attempts = 3
retry_base_delay_secs = 1
channel_buffer_size = 1000
# Solana Private Channels block time is 100 ms so poll quickly
confirmation_poll_interval_ms = 100
