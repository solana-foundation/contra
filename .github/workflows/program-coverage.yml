name: Combined Coverage Report

on:
  workflow_run:
    workflows: ["Program Unit Tests", "Program Integration Tests", "Rust Checks"]
    types:
      - completed
  workflow_dispatch:
  push:
    branches: [main, feat/coverage-ci, hardening/pre-release-audit]
    paths:
      - ".github/workflows/program-coverage.yml"
  pull_request:
    branches: [main, hardening/pre-release-audit]
    paths:
      - ".github/workflows/program-coverage.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  combine-coverage:
    name: Combine Coverage Reports
    runs-on: contra-runner-1
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download unit test coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage-reports
          path: coverage-artifacts/unit
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Download integration test coverage
        uses: actions/download-artifact@v4
        with:
          name: integration-coverage-reports
          path: coverage-artifacts/integration
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Download rust unit coverage
        uses: actions/download-artifact@v4
        with:
          name: rust-unit-coverage-reports
          path: coverage-artifacts/rust-unit
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Setup coverage tools
        run: |
          # Install tools for combining coverage reports and math calculations
          npm install -g lcov-result-merger
          sudo apt-get update && sudo apt-get install -y bc jq

      - name: Combine coverage reports
        run: |
          # Merge all available lcov files into a single combined report
          if ls coverage-artifacts/**/*.lcov 1>/dev/null 2>&1; then
            echo "Combining coverage reports..."
            lcov-result-merger 'coverage-artifacts/**/*.lcov' coverage-combined.lcov
            echo "Combined coverage report generated"
          else
            echo "No coverage reports found, skipping combination"
          fi

      - name: Generate coverage summary
        id: coverage-summary
        run: |
          echo "Coverage Summary Report"
          echo "======================="

          # Initialize coverage summary
          COVERAGE_SUMMARY=""

          # Helper: parse an lcov file and append to summary
          parse_lcov() {
            local file="$1" label="$2"
            if [ -f "$file" ]; then
              LINES_FOUND=$(grep -E "^LF:" "$file" | awk -F: '{sum += $2} END {print sum}')
              LINES_HIT=$(grep -E "^LH:" "$file" | awk -F: '{sum += $2} END {print sum}')
              if [ "$LINES_FOUND" -gt 0 ]; then
                COV=$(echo "scale=1; $LINES_HIT * 100 / $LINES_FOUND" | bc)
                echo "${label}: ${COV}%"
                COVERAGE_SUMMARY="${COVERAGE_SUMMARY}**${label}:** ${COV}%\n"
              fi
            fi
          }

          # Program unit coverage (downloaded into coverage-artifacts/unit/coverage/)
          parse_lcov "coverage-artifacts/unit/coverage/coverage-escrow-unit.lcov" "Escrow Unit Tests"
          parse_lcov "coverage-artifacts/unit/coverage/coverage-withdraw-unit.lcov" "Withdraw Unit Tests"

          # Program integration coverage (downloaded into coverage-artifacts/integration/coverage/)
          parse_lcov "coverage-artifacts/integration/coverage/coverage-escrow-integration.lcov" "Escrow Integration Tests"
          parse_lcov "coverage-artifacts/integration/coverage/coverage-withdraw-integration.lcov" "Withdraw Integration Tests"

          # Core + indexer unit coverage (downloaded into coverage-artifacts/rust-unit/coverage/)
          parse_lcov "coverage-artifacts/rust-unit/coverage/coverage-core-unit.lcov" "Core Unit Tests"
          parse_lcov "coverage-artifacts/rust-unit/coverage/coverage-indexer-unit.lcov" "Indexer Unit Tests"

          # Save summary for PR comment
          echo "COVERAGE_SUMMARY<<EOF" >> $GITHUB_OUTPUT
          echo -e "$COVERAGE_SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post coverage comment on PR
        if: github.event.workflow_run.event == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverageSummary = `${{ steps.coverage-summary.outputs.COVERAGE_SUMMARY }}`;
            
            const comment = `## 📊 Coverage Report
            
            ${coverageSummary}
            
            <details>
            <summary>📁 View Coverage Artifacts</summary>
            
            Coverage reports have been generated for all test suites:
            - [Combined Coverage Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Individual test coverage artifacts available in workflow runs
            
            </details>`;

            // Find the PR number from the triggering workflow
            const prNumber = ${{ github.event.workflow_run.pull_requests[0].number || 'null' }};
            
            if (!prNumber) {
              console.log('No PR number found, skipping comment');
              return;
            }

            // Find existing coverage comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## 📊 Coverage Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
              console.log('Updated existing coverage comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
              console.log('Created new coverage comment');
            }

      - name: Upload combined coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage-report
          path: |
            coverage-combined.lcov
            coverage-artifacts/
          retention-days: 30
