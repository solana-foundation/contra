# Devnet configuration for Solana Operator (escrow program)
# Processes deposits FROM Solana → Mints TO Solana Private Channels

[common]
program_type = "escrow"
rpc_url = "http://gateway:8899"
# TODO: Add devnet solana rpc url
source_rpc_url = "your_devnet_solana_rpc_url"
# TODO: Add escrow instance id
escrow_instance_id = "your_escrow_instance_id"

[storage]
type = "postgres"
max_connections = 10

[operator]
poll_interval_secs = 1
batch_size = 1000
retry_max_attempts = 3
retry_base_delay_secs = 1
channel_buffer_size = 1000
# Solana Private Channels block time is ~100 ms; poll quickly to reduce per-mint latency
confirmation_poll_interval_ms = 100
