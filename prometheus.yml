global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # cAdvisor metrics for all containers
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Keep only metrics for specific containers
      - source_labels: [container_label_com_docker_compose_service]
        regex: '(write-node|read-node|gateway|streamer|postgres-primary|postgres-replica|postgres-indexer|activity|validator|indexer-solana|indexer-contra|operator-solana|operator-contra)'
        action: keep

  # Indexer & Operator app-level metrics
  - job_name: 'indexer-solana'
    static_configs:
      - targets: ['indexer-solana${HOST_SUFFIX}:9100']

  - job_name: 'indexer-contra'
    static_configs:
      - targets: ['indexer-contra${HOST_SUFFIX}:9100']

  - job_name: 'operator-solana'
    static_configs:
      - targets: ['operator-solana${HOST_SUFFIX}:9100']

  - job_name: 'operator-contra'
    static_configs:
      - targets: ['operator-contra${HOST_SUFFIX}:9100']

  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway${HOST_SUFFIX}:9101']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
