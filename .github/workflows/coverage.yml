name: Coverage Report

on:
  workflow_run:
    workflows: ["Program Unit Tests", "Rust Checks", "TypeScript SDK Unit Tests"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  combine-coverage:
    name: Combine Coverage Reports
    runs-on: contra-runner-1
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Find latest successful runs for each workflow
        id: find-runs
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run?.head_branch || context.ref.replace(/^refs\/heads\//, '');
            const workflows = {
              'program-unit.yml': 'unit_run_id',
              'rust.yml': 'rust_run_id',
              'sdk-unit.yml': 'ts_run_id',
            };
            for (const [filename, output] of Object.entries(workflows)) {
              try {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: filename,
                  branch,
                  status: 'completed',
                  per_page: 5,
                });
                const successful = data.workflow_runs.filter(r => r.conclusion === 'success');
                if (successful.length > 0) {
                  core.setOutput(output, successful[0].id);
                  console.log(`${filename}: run ${successful[0].id}`);
                } else {
                  console.log(`${filename}: no successful runs on ${branch}`);
                }
              } catch (e) {
                console.log(`${filename}: lookup failed — ${e.message}`);
              }
            }

      - name: Download program unit coverage
        if: steps.find-runs.outputs.unit_run_id
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage-reports
          path: coverage-artifacts/unit
          run-id: ${{ steps.find-runs.outputs.unit_run_id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Download rust unit coverage
        if: steps.find-runs.outputs.rust_run_id
        uses: actions/download-artifact@v4
        with:
          name: rust-unit-coverage-reports
          path: coverage-artifacts/rust-unit
          run-id: ${{ steps.find-runs.outputs.rust_run_id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Download E2E integration coverage
        if: steps.find-runs.outputs.rust_run_id
        uses: actions/download-artifact@v4
        with:
          name: e2e-coverage-reports
          path: coverage-artifacts/e2e
          run-id: ${{ steps.find-runs.outputs.rust_run_id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Download escrow TS coverage
        if: steps.find-runs.outputs.ts_run_id
        uses: actions/download-artifact@v4
        with:
          name: ts-unit-coverage-contra-escrow-program
          path: coverage-artifacts/ts-escrow
          run-id: ${{ steps.find-runs.outputs.ts_run_id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Download withdraw TS coverage
        if: steps.find-runs.outputs.ts_run_id
        uses: actions/download-artifact@v4
        with:
          name: ts-unit-coverage-contra-withdraw-program
          path: coverage-artifacts/ts-withdraw
          run-id: ${{ steps.find-runs.outputs.ts_run_id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Setup coverage tools
        run: |
          npm install -g lcov-result-merger
          sudo apt-get update && sudo apt-get install -y bc jq

      - name: Normalize and filter coverage files
        run: |
          # Rename lcov.info files to .lcov for consistent globbing
          find coverage-artifacts -name 'lcov.info' | while read f; do
            dir=$(dirname "$f")
            mv "$f" "$dir/coverage.lcov"
          done
          # Remove empty coverage files
          find coverage-artifacts -name '*.lcov' | while read f; do
            if [ ! -s "$f" ]; then
              echo "WARNING: Removing empty coverage file: $f"
              rm "$f"
            fi
          done

      - name: Combine coverage reports
        run: |
          if ls coverage-artifacts/**/*.lcov 1>/dev/null 2>&1; then
            echo "Combining coverage reports..."
            lcov-result-merger 'coverage-artifacts/**/*.lcov' coverage-combined.lcov
            echo "Combined coverage report generated"
          else
            echo "No coverage reports found, skipping combination"
          fi

      - name: Generate coverage summary
        id: coverage-summary
        run: |
          echo "Coverage Summary Report"
          echo "======================="

          COVERAGE_SUMMARY=""

          parse_lcov() {
            local file="$1" label="$2"
            if [ -f "$file" ] && [ -s "$file" ]; then
              LINES_FOUND=$(grep -E "^LF:" "$file" | awk -F: '{sum += $2} END {print sum}')
              LINES_HIT=$(grep -E "^LH:" "$file" | awk -F: '{sum += $2} END {print sum}')
              if [ "$LINES_FOUND" -gt 0 ]; then
                COV=$(echo "scale=1; $LINES_HIT * 100 / $LINES_FOUND" | bc)
                echo "${label}: ${COV}%"
                COVERAGE_SUMMARY="${COVERAGE_SUMMARY}**${label}:** ${COV}%\n"
              fi
            fi
          }

          # Program unit coverage
          parse_lcov "coverage-artifacts/unit/coverage/coverage-escrow-unit.lcov" "Escrow Unit Tests"
          parse_lcov "coverage-artifacts/unit/coverage/coverage-withdraw-unit.lcov" "Withdraw Unit Tests"

          # Core + indexer + gateway unit coverage
          parse_lcov "coverage-artifacts/rust-unit/coverage/coverage-core-unit.lcov" "Core Unit Tests"
          parse_lcov "coverage-artifacts/rust-unit/coverage/coverage-indexer-unit.lcov" "Indexer Unit Tests"
          parse_lcov "coverage-artifacts/rust-unit/coverage/coverage-gateway-unit.lcov" "Gateway Unit Tests"

          # E2E integration coverage
          parse_lcov "coverage-artifacts/e2e/coverage-integration-e2e.lcov" "E2E Integration Tests"

          # TypeScript SDK coverage
          parse_lcov "coverage-artifacts/ts-escrow/coverage.lcov" "Escrow TS SDK Tests"
          parse_lcov "coverage-artifacts/ts-withdraw/coverage.lcov" "Withdraw TS SDK Tests"

          echo "COVERAGE_SUMMARY<<EOF" >> $GITHUB_OUTPUT
          echo -e "$COVERAGE_SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post coverage comment on PR
        if: github.event.workflow_run.event == 'pull_request'
        uses: actions/github-script@v7
        env:
          COVERAGE_SUMMARY: ${{ steps.coverage-summary.outputs.COVERAGE_SUMMARY }}
        with:
          script: |
            const coverageSummary = process.env.COVERAGE_SUMMARY;

            const comment = `## Coverage Report

            ${coverageSummary}

            <details>
            <summary>View Coverage Artifacts</summary>

            Coverage reports have been generated for all test suites:
            - [Combined Coverage Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Individual test coverage artifacts available in workflow runs
            - Program integration test coverage is tracked via semantic analysis in \`TEST_COVERAGE.md\`

            </details>`;

            const prNumber = ${{ github.event.workflow_run.pull_requests[0].number || 'null' }};

            if (!prNumber) {
              console.log('No PR number found, skipping comment');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## Coverage Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
              console.log('Updated existing coverage comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
              console.log('Created new coverage comment');
            }

      - name: Upload combined coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage-report
          path: |
            coverage-combined.lcov
            coverage-artifacts/
          retention-days: 30
