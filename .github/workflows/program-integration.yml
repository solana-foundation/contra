name: Program Integration Tests

on:
  push:
    branches: [main, hardening/pre-release-audit]
    paths:
      - "contra-escrow-program/**"
      - "contra-withdraw-program/**"
      - "Cargo.*"
      - "Makefile"
      - ".github/workflows/program-integration.yml"
      - "scripts/**"
  pull_request:
    branches: [main, hardening/pre-release-audit]
    paths:
      - "contra-escrow-program/**"
      - "contra-withdraw-program/**"
      - "Cargo.*"
      - "Makefile"
      - ".github/workflows/program-integration.yml"
      - "scripts/**"
env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

permissions:
  contents: read

jobs:
  integration-test:
    name: Program Integration Tests
    runs-on: contra-runner-1
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          rust-components: llvm-tools-preview
          build-programs: "false"

      - name: Run integration tests with coverage
        run: |
          echo "🧪 Running integration tests with coverage..."
          make integration-coverage

      - name: Generate HTML coverage report
        run: |
          echo "📊 Generating HTML coverage reports..."
          make coverage-html

      - name: Display coverage summary
        run: |
          echo "📈 Coverage summary will be shown by make integration-coverage"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-reports
          path: |
            contra-escrow-program/coverage-*.lcov
            contra-escrow-program/coverage-html-*/
            contra-withdraw-program/coverage-*.lcov
            contra-withdraw-program/coverage-html-*/
          retention-days: 30

      - name: Show failure logs
        if: failure()
        uses: ./.github/actions/show-failure-logs
        with:
          test-type: "Program integration"
