[defaults]
# stdout_callback: which plugin formats per-task output to the terminal.
# default = built-in; chosen because community.general.yaml was retired in v12.
stdout_callback = default

# result_format: how task results render under the default callback.
# yaml = readable top-to-bottom blocks; chosen so `==== PHASE N ====` banners stay legible.
result_format = yaml

# callbacks_enabled: extra callbacks that run alongside stdout_callback.
# timer = prints total play duration at the end; chosen because deploy-time matters.
# Add `profile_tasks` (requires `ansible-galaxy collection install ansible.posix`) for per-task timing.
callbacks_enabled = timer

# inventory: default inventory file when -i isn't passed.
# inventory.ini = the only inventory in this repo; chosen so `ansible-playbook deploy.yml` just works.
inventory = inventory.ini

# host_key_checking: whether SSH host keys are verified on first contact.
# False = skip the prompt; chosen for devnet/multi tests against throwaway hosts. Flip to True for prod targets.
host_key_checking = False

# display_skipped_hosts: show tasks that were skipped on a host.
# True = keep them visible; chosen so tag-gated phases are obvious in the log when they're skipped.
display_skipped_hosts = True

# display_ok_hosts: show tasks that succeeded.
# True = keep them visible; chosen so you can see progress, not just failures.
display_ok_hosts = True

# interpreter_python: how Ansible picks the remote Python.
# auto_silent = auto-detect without printing the discovery warning; chosen for cleaner output.
interpreter_python = auto_silent

# retry_files_enabled: write `*.retry` files listing failed hosts after a play fails.
# False = don't litter the working tree; chosen because nobody actually uses the retry workflow here.
retry_files_enabled = False

# log_path: append every play's output to a file (in addition to stdout).
# ./ansible.log = next to this cfg; chosen so failed-run forensics are always available without re-running.
# Rotate or truncate manually — Ansible doesn't.
log_path = ./ansible.log

[ssh_connection]
# pipelining: stream task modules into the remote Python over SSH stdin.
# True = ~50% faster (1 round-trip vs 3); chosen because it's safe on modern systems where requiretty is off.
pipelining = True

# ssh_args: passed to every ssh invocation.
# ControlMaster=auto + ControlPersist=60s = reuse one SSH session per host for 60s; chosen to avoid re-handshaking on every task.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
