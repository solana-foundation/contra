global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'indexer-solana'
    static_configs:
      - targets: ['indexer-solana.railway.internal:9100']

  - job_name: 'indexer-contra'
    static_configs:
      - targets: ['indexer-contra.railway.internal:9100']

  - job_name: 'operator-solana'
    static_configs:
      - targets: ['operator-solana.railway.internal:9100']

  - job_name: 'operator-contra'
    static_configs:
      - targets: ['operator-contra.railway.internal:9100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
