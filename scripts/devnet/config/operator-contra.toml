# Devnet configuration for Contra Operator (withdraw program)
# Processes withdrawals FROM Contra → Releases funds TO Solana

[common]
program_type = "withdraw"
# TODO: Add solana devnet rpc url
rpc_url = "your_solana_devnet_rpc_url"
# Contra gateway URL — operator-contra reads withdrawal events from the Contra write-node
# TODO: Add devnet contra gateway url
source_rpc_url = "your_devnet_gateway_url"
# TODO: Add escrow instance id
escrow_instance_id = "your_escrow_instance_id"

[storage]
type = "postgres"
max_connections = 10

[operator]
poll_interval_secs = 1
batch_size = 10
retry_max_attempts = 3
retry_base_delay_secs = 1
channel_buffer_size = 100
# Solana devnet block time is ~400 ms
confirmation_poll_interval_ms = 400
