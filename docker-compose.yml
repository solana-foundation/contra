services:
  # PostgreSQL Primary (for write node)
  postgres-primary:
    image: postgres:16-alpine
    container_name: contra-postgres-primary
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_REPLICATION_MODE=master
      - POSTGRES_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRES_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      # Enable replication - allow connections from Docker network
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./init-primary.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./init-primary-hba.sh:/docker-entrypoint-initdb.d/02-hba.sh:ro
    command: |
      postgres
      -c wal_level=replica
      -c hot_standby=on
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby_feedback=on
      -c wal_log_hints=on
      -c archive_mode=on
      -c archive_command='/bin/true'
      -c listen_addresses='*'
    networks:
      - contra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Write Node (formerly sequencer)
  write-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contra-write-node
    restart: unless-stopped
    depends_on:
      - postgres-primary
    environment:
      - RUST_LOG=info
      - CONTRA_PORT=${CONTRA_WRITE_PORT}
      - CONTRA_ACCOUNTSDB_CONNECTION_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB}
      - CONTRA_ENABLE_READ=false
      - CONTRA_SIGVERIFY_QUEUE_SIZE=${CONTRA_SIGVERIFY_QUEUE_SIZE}
      - CONTRA_SIGVERIFY_WORKERS=${CONTRA_SIGVERIFY_WORKERS}
      - CONTRA_MAX_CONNECTIONS=${CONTRA_WRITE_MAX_CONNECTIONS}
      - CONTRA_MAX_TX_PER_BATCH=${CONTRA_MAX_TX_PER_BATCH}
      - CONTRA_LOG_LEVEL=info
      - CONTRA_JSON_LOGS=false
      - CONTRA_MODE=write
      - CONTRA_ADMIN_KEYS=${CONTRA_ADMIN_KEYS}
    ports:
      - "${CONTRA_WRITE_PORT}:${CONTRA_WRITE_PORT}"
    command: ["/usr/local/bin/contra-node"]
    networks:
      - contra-network

  # PostgreSQL Replica (for read node)
  postgres-replica:
    image: postgres:16-alpine
    container_name: contra-postgres-replica
    restart: unless-stopped
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_REPLICATION_MODE=slave
      - POSTGRES_MASTER_HOST=postgres-primary
      - POSTGRES_MASTER_PORT=5432
      - POSTGRES_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRES_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      - PGUSER=${POSTGRES_USER}
    ports:
      - "5433:5432"
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    user: postgres
    command: |
      bash -c "
        until PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres-primary -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' > /dev/null 2>&1; do
          echo 'Waiting for primary to be ready...'
          sleep 2
        done

        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          echo 'Setting up replica...'
          rm -rf /var/lib/postgresql/data/*
          PGPASSWORD=${POSTGRES_REPLICATION_PASSWORD} pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U ${POSTGRES_REPLICATION_USER} -v -P -R -S replica_slot

          chmod 700 /var/lib/postgresql/data
          touch /var/lib/postgresql/data/standby.signal
        fi

        postgres
      "
    networks:
      - contra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Read Node
  read-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contra-read-node
    restart: unless-stopped
    depends_on:
      - postgres-replica
      - write-node
    environment:
      - RUST_LOG=info
      - CONTRA_PORT=${CONTRA_READ_PORT}
      - CONTRA_ACCOUNTSDB_CONNECTION_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB}
      - CONTRA_MAX_CONNECTIONS=${CONTRA_READ_MAX_CONNECTIONS}
      - CONTRA_ENABLE_WRITE=false
      - CONTRA_ENABLE_READ=true
      - CONTRA_LOG_LEVEL=info
      - CONTRA_JSON_LOGS=false
      - CONTRA_MODE=read
    ports:
      - "${CONTRA_READ_PORT}:${CONTRA_READ_PORT}"
    command: ["/usr/local/bin/contra-node"]
    networks:
      - contra-network

  # Gateway (Routes requests between write and read nodes)
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contra-gateway
    restart: unless-stopped
    depends_on:
      - write-node
      - read-node
    environment:
      - RUST_LOG=info
      - GATEWAY_PORT=${GATEWAY_PORT}
      - GATEWAY_WRITE_URL=${GATEWAY_WRITE_URL}
      - GATEWAY_READ_URL=${GATEWAY_READ_URL}
      - METRICS_PORT=9101
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    command: ["/usr/local/bin/gateway"]
    networks:
      - contra-network

  # WebSocket Transaction Streamer
  streamer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contra-streamer
    restart: unless-stopped
    depends_on:
      - postgres-replica
      - write-node
      - postgres-indexer
    environment:
      - RUST_LOG=info
      - STREAMER_PORT=${STREAMER_PORT:-8902}
      - STREAMER_ACCOUNTSDB_CONNECTION_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB}
      - STREAMER_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-indexer:5432/${POSTGRES_INDEXER_DB}
      - STREAMER_POLL_INTERVAL_MS=200
      - STREAMER_LOG_LEVEL=info
    ports:
      - "${STREAMER_PORT:-8902}:${STREAMER_PORT:-8902}"
    command: ["/usr/local/bin/streamer"]
    networks:
      - contra-network

  # Activity Generator
  activity:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contra-activity
    restart: unless-stopped
    depends_on:
      - write-node
      - read-node
    environment:
      - RUST_LOG=info
    volumes:
      - ./keypairs:/keypairs:ro
    command:
      [
        "/usr/local/bin/activity",
        "--rpc-url",
        "${GATEWAY_URL}",
        "--admin-keypair",
        "/keypairs/admin.json",
        "--users",
        "1000",
        "--initial-balance",
        "10000",
        "--user-delay-ms",
        "1000",
        "--admin-delay-ms",
        "10000",
        "-v",
      ]
    networks:
      - contra-network

  # Solana Validator with Yellowstone gRPC Plugin
  validator:
    build:
      context: .
      dockerfile: validator.Dockerfile
    container_name: contra-validator
    restart: unless-stopped
    deploy:
      replicas: 1
    ports:
      - "18899:8899"
      - "18900:8900"
      - "10000:10000"
      - "18999:8999"
    volumes:
      - validator-data:/validator-data
      - ./yellowstone-config.json:/config/yellowstone-config.json:ro
      - ./target/deploy:/programs:ro
    environment:
      - RUST_LOG=info
      - ESCROW_PROGRAM_ID=${ESCROW_PROGRAM_ID}
      - WITHDRAW_PROGRAM_ID=${WITHDRAW_PROGRAM_ID}
    command: >
      solana-test-validator
      --reset
      --bpf-program ${ESCROW_PROGRAM_ID} /programs/contra_escrow_program.so
      --bpf-program ${WITHDRAW_PROGRAM_ID} /programs/contra_withdraw_program.so
      --clone TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA
      --clone TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb
      --clone ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL
      --url https://api.mainnet-beta.solana.com
      --geyser-plugin-config /config/yellowstone-config.json
    networks:
      - contra-network
    healthcheck:
      test: ["CMD-SHELL", "solana cluster-version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Indexer
  postgres-indexer:
    image: postgres:16-alpine
    container_name: contra-postgres-indexer
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_INDEXER_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres-indexer-data:/var/lib/postgresql/data
    networks:
      - contra-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_INDEXER_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Indexer Service - Solana (Yellowstone)
  indexer-solana:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contra-indexer-solana
    restart: unless-stopped
    deploy:
      replicas: 1
    depends_on:
      postgres-indexer:
        condition: service_healthy
      validator:
        condition: service_healthy
    environment:
      - RUST_LOG=info,contra_indexer=debug
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-indexer:5432/${POSTGRES_INDEXER_DB}
      - COMMON_RPC_URL=${LOCAL_VALIDATOR_RPC_URL}
      - INDEXER_YELLOWSTONE_ENDPOINT=http://validator:10000
      - METRICS_PORT=9100
    volumes:
      - ./indexer/config:/config:ro
    command:
      - /bin/sh
      - -c
      - |
        /usr/local/bin/indexer \
          --config /config/local/indexer-solana.toml \
          -v \
          indexer
    networks:
      - contra-network

  # Indexer Service - Contra (RPC Polling)
  indexer-contra:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contra-indexer-contra
    restart: unless-stopped
    deploy:
      replicas: 1
    depends_on:
      postgres-indexer:
        condition: service_healthy
      validator:
        condition: service_healthy
    environment:
      - RUST_LOG=info,contra_indexer=debug
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-indexer:5432/${POSTGRES_INDEXER_DB}
      - COMMON_RPC_URL=${LOCAL_VALIDATOR_RPC_URL}
      - METRICS_PORT=9100
    volumes:
      - ./indexer/config:/config:ro
    command:
      - /bin/sh
      - -c
      - |
        /usr/local/bin/indexer \
          --config /config/local/indexer-contra.toml \
          -v \
          indexer
    networks:
      - contra-network

  # Operator Service - Solana
  operator-solana:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contra-operator-solana
    restart: unless-stopped
    depends_on:
      postgres-indexer:
        condition: service_healthy
    environment:
      - RUST_LOG=info,contra_indexer=debug
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-indexer:5432/${POSTGRES_INDEXER_DB}
      - COMMON_RPC_URL=${LOCAL_VALIDATOR_RPC_URL}
      - ADMIN_SIGNER=memory
      - ADMIN_PRIVATE_KEY=${ADMIN_PRIVATE_KEY}
      - OPERATOR_SIGNER=memory
      - OPERATOR_PRIVATE_KEY=${ADMIN_PRIVATE_KEY}
      - METRICS_PORT=9100
    volumes:
      - ./indexer/config:/config:ro
    command:
      - /bin/sh
      - -c
      - |
        /usr/local/bin/indexer \
          --config /config/local/operator-solana.toml \
          -v \
          operator
    networks:
      - contra-network

  # Operator Service - Contra
  operator-contra:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contra-operator-contra
    restart: unless-stopped
    depends_on:
      postgres-indexer:
        condition: service_healthy
    environment:
      - RUST_LOG=info,contra_indexer=debug
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-indexer:5432/${POSTGRES_INDEXER_DB}
      - COMMON_RPC_URL=${LOCAL_VALIDATOR_RPC_URL}
      - ADMIN_SIGNER=memory
      - ADMIN_PRIVATE_KEY=${ADMIN_PRIVATE_KEY}
      - OPERATOR_SIGNER=memory
      - OPERATOR_PRIVATE_KEY=${ADMIN_PRIVATE_KEY}
      - METRICS_PORT=9100
    volumes:
      - ./indexer/config:/config:ro
    command:
      - /bin/sh
      - -c
      - |
        /usr/local/bin/indexer \
          --config /config/local/operator-contra.toml \
          -v \
          operator
    networks:
      - contra-network

  # cAdvisor for container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: contra-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    networks:
      - contra-network

  # Prometheus for metrics collection
  prometheus:
    build:
      context: .
      dockerfile: Dockerfile.prometheus
    container_name: contra-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    environment:
      - HOST_SUFFIX=
    networks:
      - contra-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: contra-grafana
    restart: unless-stopped
    ports:
      - "37429:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - POSTGRES_INDEXER_DB=${POSTGRES_INDEXER_DB}
      - POSTGRES_INDEXER_HOST=${POSTGRES_INDEXER_HOST:-postgres-indexer}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
    networks:
      - contra-network

volumes:
  postgres-primary-data:
  postgres-replica-data:
  postgres-indexer-data:
  validator-data:
  prometheus-data:
  grafana-data:

networks:
  contra-network:
    driver: bridge
